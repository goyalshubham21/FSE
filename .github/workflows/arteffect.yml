name: artifact

on: push

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Create a file
        run: echo "This is a sample artifact file." > artifact.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: artifact.txt
  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-artifact
      - name: Read artifact content
        run: artifact.txt